<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Greycode{% endblock %}</title>

  <!-- “Nice” site styling -->
  <link rel="stylesheet" href="/site/style.css" />
  <!-- Ops-specific add-on -->
  <link rel="stylesheet" href="/static/style.css" />

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="wrap wrap-ops">
    <header class="ops-banner">
      <div class="ops-banner-inner">
        <div class="ops-title">
          <div class="title">
            <h1>Greycode</h1>
            <p>Ops • Sysmon enrichment</p>
          </div>
        </div>

        <!-- placeholder for future icons -->
        <div class="ops-actions">
          <a class="iconbtn" href="#" title="Settings" aria-label="Settings">⚙</a>
          <a class="iconbtn" href="#" title="Profile" aria-label="Profile">👤</a>
          <form method="post" action="/logout" style="margin:0;">
            <button class="iconbtn" type="submit" title="Logout" aria-label="Logout">⎋</button>
          </form>
        </div>
      </div>
    </header>

    <div class="ops-toolbar">
      <div class="ops-toolbar-inner">
        <nav class="ops-tabs" aria-label="Sysmon tabs">
          <a href="/ui/sysmon/1" class="{% if tab==1 %}active{% endif %}">Sysmon 1</a>
          <a href="/ui/sysmon/3" class="{% if tab==3 %}active{% endif %}">Sysmon 3</a>
          <a href="/ui/sysmon/22" class="{% if tab==22 %}active{% endif %}">Sysmon 22</a>
        </nav>

        <div class="ops-chips">
          {% if vt_enabled %}
            <span class="chip">VT enabled</span>
          {% else %}
            <span class="chip">VT disabled</span>
          {% endif %}
          <span class="chip">VT queue: {{ vt_queue_len }}</span>
          <span class="chip">Staged: {{ staged_candidates }}</span>
        </div>
      </div>
    </div>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="drawerBackdrop" class="drawer-backdrop"></div>

  {% block scripts %}
  <script>
    function gcOpenDrawer() {
      document.body.classList.add("drawer-open");
      const d = document.getElementById("drawer");
      if (d) d.setAttribute("aria-hidden", "false");
    }

    function gcCloseDrawer() {
      document.body.classList.remove("drawer-open");
      const d = document.getElementById("drawer");
      if (d) d.setAttribute("aria-hidden", "true");
    }

    // Backdrop click closes drawer
    document.addEventListener("click", function (e) {
      if (e.target && e.target.id === "drawerBackdrop") gcCloseDrawer();
    });

    // ESC closes drawer
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") gcCloseDrawer();
    });

    // If HTMX loads drawer content, ensure drawer is open
    document.body.addEventListener("htmx:afterSwap", function (e) {
      if (e.target && e.target.id === "drawer") {
        gcOpenDrawer();
      }
    });
  </script>
  {% endblock %}
</body>
</html>
