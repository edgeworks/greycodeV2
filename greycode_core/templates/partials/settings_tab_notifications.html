<section class="settings-section">
  <h2>Notifications</h2>
  <p class="muted">Email only for now</p>

  <form
    class="settings-form"
    hx-post="/ui/settings/notifications"
    hx-target="#settingsModalContent"
    hx-swap="innerHTML">

    <div class="settings-grid">
      <label>Email notifications
        <select name="notify_email_enabled">
          <option value="1" {% if settings.notify_email_enabled_bool %}selected{% endif %}>Enabled</option>
          <option value="0" {% if not settings.notify_email_enabled_bool %}selected{% endif %}>Disabled</option>
        </select>
      </label>

      <label>Recipients
        <input
          name="notify_email_to"
          value="{{ settings.notify_email_to }}"
          placeholder="soc@example.org, oncall@example.org">
      </label>

      <label>From
        <input
          name="notify_email_from"
          value="{{ settings.notify_email_from }}"
          placeholder="greycode@localhost">
      </label>

      <label>Subject prefix
        <input
          name="notify_email_subject_prefix"
          value="{{ settings.notify_email_subject_prefix }}"
          placeholder="[Greycode]">
      </label>

      <label>SMTP host
        <input
          name="notify_smtp_host"
          value="{{ settings.notify_smtp_host }}"
          placeholder="smtp.example.org">
      </label>

      <label>SMTP port
        <input
          type="number"
          min="1"
          step="1"
          name="notify_smtp_port"
          value="{{ settings.notify_smtp_port }}">
      </label>

      <label>SMTP user
        <input
          name="notify_smtp_user"
          value="{{ settings.notify_smtp_user }}"
          placeholder="optional">
      </label>

      <label>SMTP password
        <input
          type="password"
          name="notify_smtp_pass"
          placeholder="{% if settings.notify_smtp_pass_masked %}Password stored{% else %}Not set{% endif %}">
        <div class="hint muted">Leave empty to keep existing password.</div>
      </label>

      <label>STARTTLS
        <select name="notify_smtp_starttls">
          <option value="1" {% if settings.notify_smtp_starttls == "1" %}selected{% endif %}>Enabled</option>
          <option value="0" {% if settings.notify_smtp_starttls != "1" %}selected{% endif %}>Disabled</option>
        </select>
      </label>
    </div>

    <div class="settings-actions">
      <button class="btn primary" type="submit">Save Notifications</button>
    </div>
  </form>
</section>
