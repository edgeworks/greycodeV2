<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Greycode – Login</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body data-theme="{{ theme or 'dark' }}">
  <div class="wrap">
    <header class="card header">
      <div class="brand">
        <div class="title">
          <h1>Greycode</h1>
          <p>Sysmon Threat Enrichment Portal</p>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="card" style="grid-column: span 12;">
        <h2>Sign in</h2>
        {% if err %}
          <p class="login-error">Invalid credentials.</p>
        {% else %}
          <p class="muted">Enter your credentials to access the Greycode UI.</p>
        {% endif %}

        <form method="post" action="/login" class="loginform">
          <label>Username
            <input type="text" name="username" autocomplete="username" required />
          </label>

          <label>Password
            <input type="password" name="password" autocomplete="current-password" required />
          </label>

          <div class="actions">
            <button class="btn primary" type="submit">Login</button>
            <a class="btn" href="/health">Health</a>
          </div>

          <input type="hidden" name="next" value="{{ next or '/ui' }}" />
        </form>
      </section>
    </main>

    <footer class="footer">
      <span class="muted">Greycode • 2026</span>
    </footer>
  </div>
</body>
</html>
