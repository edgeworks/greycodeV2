{% extends "base_ops.html" %}
{% block title %}Greycode • Computers{% endblock %}

{% block content %}
<section class="card">
  <form id="computerFilters"
        class="controls"
        hx-get="/ui/computers/table"
        hx-target="#computerTablewrap"
        hx-trigger="submit">

    <label>Search
      <input type="text" name="q" value="{{ q }}" placeholder="computer name">
    </label>

    <label>Sort
      <select name="sort">
        <option value="noticeable_score" {% if sort == "noticeable_score" %}selected{% endif %}>Noticeable score</option>
        <option value="rare_unknown_hash_count" {% if sort == "rare_unknown_hash_count" %}selected{% endif %}>Rare unknown hashes</option>
        <option value="rare_total" {% if sort == "rare_total" %}selected{% endif %}>Rare total</option>
        <option value="red_count" {% if sort == "red_count" %}selected{% endif %}>RED</option>
        <option value="listed_count" {% if sort == "listed_count" %}selected{% endif %}>Listed</option>
        <option value="last_seen" {% if sort == "last_seen" %}selected{% endif %}>Last seen</option>
      </select>
    </label>

    <label>Order
      <select name="order">
        <option value="desc" {% if order == "desc" %}selected{% endif %}>Desc</option>
        <option value="asc" {% if order == "asc" %}selected{% endif %}>Asc</option>
      </select>
    </label>

    <label>Page size
      <select name="page_size">
        {% for ps in [50,100,200,500,1000] %}
          <option value="{{ ps }}" {% if page_size == ps %}selected{% endif %}>{{ ps }}</option>
        {% endfor %}
      </select>
    </label>

    <input type="hidden" name="page" value="1">

    <div class="actions" style="margin-top: 18px;">
      <button class="btn primary" type="submit">Apply</button>
    </div>
  </form>

  <div id="computerTablewrap"
       hx-get="/ui/computers/table?q={{ q }}&sort={{ sort }}&order={{ order }}&page={{ page }}&page_size={{ page_size }}"
       hx-trigger="load">
    <p class="muted">Loading…</p>
  </div>
</section>

<aside class="drawer-panel" id="drawerPanel" aria-label="Computer details drawer">
  <div class="drawer-shell" id="drawer" aria-hidden="true">
    <div class="card">
      <h2 style="margin-top:0;">Details</h2>
      <p class="drawer-empty">Click a computer to open details.</p>
    </div>
  </div>
</aside>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    document.body.addEventListener("htmx:configRequest", function (e) {
      if (e.target && e.target.id === "computerFilters") {
        const params = new URLSearchParams(e.detail.parameters);
        const newUrl = "/ui/computers?" + params.toString();
        e.detail.headers["HX-Push-Url"] = newUrl;
      }
    });
  </script>
{% endblock %}
